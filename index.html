//  히스토리 뷰 — 잔디 캘린더 + 통계 대시보드
// ══════════════════════════════════════════════════════
let historyCache = null; // Firebase에서 불러온 히스토리

async function loadHistory() {
  if (!currentUser) return {};
  try {
    const snap = await get(ref(db, `users/${currentUser.uid}/history`));
    return snap.val() || {};
  } catch(e) { return {}; }
}

function pctClass(pct) {
  if (pct === null) return 'empty';
  if (pct === 0) return 'pct-0';
  if (pct < 0.4) return 'pct-25';
  if (pct < 0.7) return 'pct-50';
  if (pct < 1.0) return 'pct-75';
  return 'pct-100';
}

async function renderHistory() {
  const hv = document.getElementById('historyView');
  hv.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim);font-size:13px;">📊 불러오는 중…</div>';

  const history = await loadHistory();
  historyCache = history;
  hv.innerHTML = '';

  // ── 잔디 캘린더 (최근 16주) ──
  const heatTitle = document.createElement('div');
  heatTitle.className = 'hist-section-title';
  heatTitle.textContent = '🌱 달성 캘린더';
  hv.appendChild(heatTitle);

  const heatCard = document.createElement('div');
  heatCard.className = 'heatmap-wrap';

  const today = new Date();
  const WEEKS = 16;
  const DAYS = WEEKS * 7;

  // 날짜별 완료율 맵
  const rateMap = {};
  Object.entries(history).forEach(([dateKey, entry]) => {
    const allItems = (entry.sections || []).flatMap(s => s.items || []);
    const total = allItems.length;
    const done = allItems.filter(it => it.completed).length;
    rateMap[dateKey] = total > 0 ? done / total : 0;
  });

  // 월 레이블
  const monthsRow = document.createElement('div');
  monthsRow.className = 'heatmap-months';
  const monthsSeen = new Set();
  const monthLabels = [];
  for (let w = 0; w < WEEKS; w++) {
    const d = new Date(today);
    d.setDate(today.getDate() - (WEEKS - 1 - w) * 7);
    const mo = d.getMonth();
    if (!monthsSeen.has(mo)) { monthsSeen.add(mo); monthLabels.push({w, label: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'][mo]}); }
  }
  const dayLabels = document.createElement('div');
  dayLabels.className = 'heatmap-days-label';
  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'heatmap-day-label';
    el.textContent = i % 2 === 1 ? d : '';
    dayLabels.appendChild(el);
  });

  const weeksRow = document.createElement('div');
  weeksRow.className = 'heatmap-weeks';

  let selectedCell = null;
  const detailPanel = document.createElement('div');
  detailPanel.className = 'hist-detail';

  for (let w = 0; w < WEEKS; w++) {
    const weekEl = document.createElement('div');
    weekEl.className = 'heatmap-week';
    for (let d = 0; d < 7; d++) {
      const cellDate = new Date(today);
      const daysAgo = (WEEKS - 1 - w) * 7 + (6 - d);
      cellDate.setDate(today.getDate() - daysAgo);
      const isFuture = cellDate > today;
      const dateKey = `${cellDate.getFullYear()}${String(cellDate.getMonth()+1).padStart(2,'0')}${String(cellDate.getDate()).padStart(2,'0')}`;
      const pct = rateMap[dateKey] !== undefined ? rateMap[dateKey] : null;

      const cell = document.createElement('div');
      cell.className = 'heatmap-cell ' + (isFuture ? 'empty' : pctClass(pct));
      cell.title = dateKey;

      if (!isFuture) {
        const showDetail = () => {
          if (selectedCell) selectedCell.style.outline = '';
          selectedCell = cell;
          cell.style.outline = '2px solid var(--gold)';
          renderHistDetail(detailPanel, dateKey, history[dateKey]);
          detailPanel.classList.add('show');
        };
        cell.addEventListener('click', showDetail);
        cell.addEventListener('touchend', e => { e.preventDefault(); showDetail(); }, {passive:false});
      }
      weekEl.appendChild(cell);
    }
    weeksRow.appendChild(weekEl);
  }

  // 범례
  const legend = document.createElement('div');
  legend.className = 'heatmap-legend';
  legend.innerHTML = '<span class="heatmap-legend-label">적음</span>';
  ['pct-0','pct-25','pct-50','pct-75','pct-100'].forEach(cls => {
    const c = document.createElement('div');
    c.className = `heatmap-legend-cell ${cls}`;
    legend.appendChild(c);
  });
  legend.innerHTML += '<span class="heatmap-legend-label">많음</span>';

  const gridWrap = document.createElement('div');
  gridWrap.className = 'heatmap-grid';
  gridWrap.appendChild(dayLabels);
  gridWrap.appendChild(weeksRow);

  heatCard.appendChild(gridWrap);
  heatCard.appendChild(legend);
  hv.appendChild(heatCard);
  hv.appendChild(detailPanel);

  // ── 통계 대시보드 ──
  const statTitle = document.createElement('div');
  statTitle.className = 'hist-section-title';
  statTitle.style.marginTop = '8px';
  statTitle.textContent = '📈 통계';
  hv.appendChild(statTitle);

  const entries = Object.values(history);
  const totalDays = entries.length;
  const avgPct = totalDays > 0
    ? Math.round(entries.reduce((sum, e) => {
        const all = (e.sections||[]).flatMap(s=>s.items||[]);
        return sum + (all.length ? all.filter(it=>it.completed).length/all.length : 0);
      }, 0) / totalDays * 100)
    : 0;

  // 수치 카드
  const statCards = document.createElement('div');
  statCards.className = 'stat-cards';

  const makeStatCard = (num, label) => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-num">${num}</div><div class="stat-label">${label}</div>`;
    return card;
  };
  statCards.appendChild(makeStatCard(streak + '일', '현재 스트릭 🔥'));
  statCards.appendChild(makeStatCard(avgPct + '%', '평균 완료율'));
  statCards.appendChild(makeStatCard(totalDays + '일', '기록된 날'));
  const perfect = entries.filter(e => {
    const all = (e.sections||[]).flatMap(s=>s.items||[]);
    return all.length > 0 && all.every(it=>it.completed);
  }).length;
  statCards.appendChild(makeStatCard(perfect + '일', '100% 달성'));
  hv.appendChild(statCards);

  // 섹션별 완료율
  const secRateCard = document.createElement('div');
  secRateCard.className = 'stat-card-full';

  const secTitle = document.createElement('div');
  secTitle.style.cssText = 'font-size:12px;font-weight:700;color:var(--dim);margin-bottom:12px;';
  secTitle.textContent = '섹션별 평균 완료율';
  secRateCard.appendChild(secTitle);

  // 섹션별 집계
  const secStats = {};
  entries.forEach(e => {
    (e.sections||[]).forEach(sec => {
      if (!secStats[sec.name]) secStats[sec.name] = {col: sec.col, emoji: sec.emoji, done: 0, total: 0};
      const items = sec.items || [];
      secStats[sec.name].total += items.length;
      secStats[sec.name].done += items.filter(it=>it.completed).length;
    });
  });

  Object.entries(secStats).sort((a,b) => (b[1].done/Math.max(b[1].total,1)) - (a[1].done/Math.max(a[1].total,1))).forEach(([name, s]) => {
    const pct = s.total > 0 ? Math.round(s.done/s.total*100) : 0;
    const row = document.createElement('div');
    row.className = 'sec-rate-row';
    row.innerHTML = `<div class="sec-rate-name">${s.emoji} ${name}</div><div class="sec-rate-bar-wrap"><div class="sec-rate-bar" style="width:${pct}%;background:${s.col};"></div></div><div class="sec-rate-pct">${pct}%</div>`;
    secRateCard.appendChild(row);
  });
  hv.appendChild(secRateCard);

  // 최근 7일 완료율 바 그래프
  const barCard = document.createElement('div');
  barCard.className = 'stat-card-full';
  const barTitle = document.createElement('div');
  barTitle.style.cssText = 'font-size:12px;font-weight:700;color:var(--dim);margin-bottom:8px;';
  barTitle.textContent = '최근 7일 완료율';
  barCard.appendChild(barTitle);

  const barGraph = document.createElement('div');
  barGraph.className = 'streak-graph';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dk = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const rate = rateMap[dk] !== undefined ? rateMap[dk] : 0;
    const pctH = Math.max(rate * 100, 2);
    const dayName = ['일','월','화','수','목','금','토'][d.getDay()];
    const wrap = document.createElement('div');
    wrap.className = 'streak-bar-wrap';
    wrap.innerHTML = `<div class="streak-bar" style="height:${pctH}%;background:${rate > 0.7 ? 'var(--gold)' : rate > 0.3 ? 'rgba(212,168,83,.5)' : 'var(--border)'};"></div><div class="streak-bar-label">${dayName}</div>`;
    barGraph.appendChild(wrap);
  }
  barCard.appendChild(barGraph);
  hv.appendChild(barCard);
}

function renderHistDetail(panel, dateKey, entry) {
  panel.innerHTML = '';
  const y = dateKey.slice(0,4), m = dateKey.slice(4,6), d = dateKey.slice(6,8);
  const dateLabel = document.createElement('div');
  dateLabel.className = 'hist-detail-date';
  dateLabel.textContent = `${m}월 ${d}일 (${y})`;
  panel.appendChild(dateLabel);

  if (!entry) {
    const empty = document.createElement('div');
    empty.style.cssText = 'font-size:13px;color:var(--faint);padding:8px 0;';
    empty.textContent = '기록 없음';
    panel.appendChild(empty);
    return;
  }

  (entry.sections||[]).forEach(sec => {
    const items = sec.items || [];
    if (!items.length) return;
    const secDiv = document.createElement('div');
    secDiv.className = 'hist-detail-sec';
    const done = items.filter(it=>it.completed).length;
    secDiv.innerHTML = `<div class="hist-detail-sec-name"><span style="width:3px;height:10px;border-radius:2px;background:${sec.col};display:inline-block;"></span>${sec.emoji} ${sec.name} <span style="color:var(--gold);font-size:10px;">${done}/${items.length}</span></div>`;
    items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'hist-detail-item' + (it.completed ? ' done' : '');
      row.innerHTML = `<div class="hist-done-dot" style="background:${it.completed ? sec.col : 'var(--border)'};"></div>${esc(it.text)}`;
      secDiv.appendChild(row);
    });
    panel.appendChild(secDiv);
  });
}


// ══════════════════════════════════════════════════════
//  Undo 기능
// ══════════════════════════════════════════════════════
let undoToastTimer = null;

function showUndoToast(msg) {
  const el = document.getElementById('undoToast');
  const msgEl = document.getElementById('undoMsg');
  if (!el || !msgEl) return;
  msgEl.textContent = msg;
  el.classList.add('show');
  clearTimeout(undoToastTimer);
  undoToastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

function hideUndoToast() {
  const el = document.getElementById('undoToast');
  if (el) el.classList.remove('show');
  clearTimeout(undoToastTimer);
}

function doUndo() {
  if (!undoStack.length) { showToast('더 이상 취소할 게 없어'); return; }
  const last = undoStack.pop();
  hideUndoToast();

  if (last.type === 'archive') {
    // 아카이브 취소 → hz_archived에서 제거
    archivedItems = archivedItems.filter(a => a.itemId !== last.payload.itemId);
    LS.set('hz_archived', archivedItems);
    render(); updateHeader();
    showToast('↩ 보관 취소됨');

  } else if (last.type === 'delete') {
    // 삭제 취소 → 섹션에 다시 추가
    const { secKey, item, wasChecked, checkTime } = last.payload;
    const sec = sections.find(s => s.key === secKey);
    if (sec) {
      sec.items.push(item);
      LS.set('hz_sections', sections);
      if (wasChecked) { checked[item.id] = true; if (checkTime) checkedTimes[item.id] = checkTime; }
      LS.set('hz_checked', checked); LS.set('hz_ctimes', checkedTimes);
      fbWriteSections();
      if (currentUser) {
        if (wasChecked) {
          set(ref(db, `users/${currentUser.uid}/checked/${item.id}`), true);
          if (checkTime) set(ref(db, `users/${currentUser.uid}/checkedTimes/${item.id}`), checkTime);
        }
      }
      render(); updateHeader();
      showToast('↩ 삭제 취소됨');
    }
  }

  // 아직 스택에 남아있으면 토스트 다시 표시
  if (undoStack.length) {
    const prev = undoStack[undoStack.length - 1];
    showUndoToast(prev.type === 'archive' ? '보관 처리됨' : '삭제됨');
  }
}

// ── Page Visibility: 탭이 다시 활성화되면 리스너 재연결 ──
// 사파리가 백그라운드에서 탭을 재워버려 리스너가 끊기는 문제 해결
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && currentUser) {
    startRealtimeSync();
    pollNotionSync(); // 백그라운드에서 놓친 Notion 변경 즉시 체크
    showSyncStatus('🔄 재연결됨');
  }
});

// undo 버튼
document.getElementById('undoBtn').addEventListener('click', doUndo);
document.getElementById('undoBtn').addEventListener('touchend', e => { e.preventDefault(); doUndo(); }, {passive:false});

// ── Init ──
initDate();initStreak();renderTitle();applyTheme(curTheme);applyLang(curLang);setView('list');
</script>
