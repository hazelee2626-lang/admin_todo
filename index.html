<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hazel Check</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');
    :root {
      --bg:#12100B; --surface:#1B1813; --surf2:#232018; --text:#EEE8DC;
      --dim:#9A8E7E; --border:#2B2720; --gold:#D4A853;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .app-name { font-size: 24px; font-weight: 700; color: var(--gold); }
    #listView { display: flex; flex-direction: column; gap: 15px; }
    .sec-card { background: var(--surface); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
    .item-li { padding: 8px 0; border-bottom: 1px solid var(--border); list-style: none; }
    .item-li.done { text-decoration: line-through; color: var(--dim); }
    button { cursor: pointer; border-radius: 8px; border: none; padding: 8px 12px; font-family: inherit; }
    #authBtn { background: var(--surf2); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

<header>
  <div class="app-name">Hazel Check ✨</div>
  <button id="authBtn">로딩 중...</button>
</header>

<div id="syncStatus" style="font-size:12px; color:var(--gold); margin-bottom:10px; height:15px;"></div>
<div id="listView"></div>

<script type="module">
  // 1. Firebase 라이브러리 로드
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // 2. 하젤의 설정값 (정확히 입력됨)
  const firebaseConfig = {
    apiKey: "AIzaSyAp9OwLP6uthZUyUmOMG648fvxRcs7MxmE",
    authDomain: "hyperdodo-hazel.firebaseapp.com",
    databaseURL: "https://hyperdodo-hazel-default-rtdb.firebaseio.com",
    projectId: "hyperdodo-hazel",
    storageBucket: "hyperdodo-hazel.firebasestorage.app",
    messagingSenderId: "691673973840",
    appId: "1:691673973840:web:6caaf412e505f580f3bd55"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const WORKER_URL = 'https://hazel-notion-proxy.hazelee-2626.workers.dev';

  let currentUser = null;

  // 3. 로그인 버튼 제어
  const authBtn = document.getElementById('authBtn');
  authBtn.onclick = async () => {
    if (currentUser) await signOut(auth);
    else await signInWithPopup(auth, new GoogleAuthProvider());
  };

  // 4. 상태 감지 및 동기화 시작
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      authBtn.textContent = '로그아웃';
      startSync(user.uid);
    } else {
      authBtn.textContent = '🔑 Google 로그인';
      document.getElementById('listView').innerHTML = '<p style="color:var(--dim); text-align:center;">로그인하면 할 일이 보여요!</p>';
    }
  });

  function startSync(uid) {
    const statusEl = document.getElementById('syncStatus');
    statusEl.textContent = '☁️ 동기화 중...';
    
    // 데이터 불러오기 (Firebase)
    onValue(ref(db, `users/${uid}`), (snap) => {
      const data = snap.val();
      if (!data) return;
      
      const sections = data.sections || [];
      const checked = data.checked || {};
      
      render(sections, checked);
      statusEl.textContent = '✅ 동기화 완료';
      setTimeout(() => statusEl.textContent = '', 2000);
    });
  }

  function render(sections, checked) {
    const lv = document.getElementById('listView');
    lv.innerHTML = '';
    
    sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'sec-card';
      card.innerHTML = `<h3 style="margin:0 0 10px 0;">${sec.emoji} ${sec.name}</h3>`;
      
      const ul = document.createElement('ul');
      ul.style.padding = '0';
      
      (sec.items || []).forEach(it => {
        const li = document.createElement('li');
        li.className = 'item-li' + (checked[it.id] ? ' done' : '');
        li.textContent = it.text;
        ul.appendChild(li);
      });
      
      card.appendChild(ul);
      lv.appendChild(card);
    });
  }

  console.log("Hazel Check App Loaded! 🚀");
</script>
</body>
</html>
